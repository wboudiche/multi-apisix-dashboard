name: Frontend e2e test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
        - "**"
  schedule:
    # Run at 2:00 AM UTC every day
    # This should be later than the update time of `apache/apisix:dev`
    # Ref: https://github.com/apache/apisix-docker/blob/master/.github/workflows/apisix_dev_push_docker_hub.yaml#L7C15-L7C16
    - cron: '0 2 * * *'
  repository_dispatch:
    types: [e2e-test]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # only run when e2e-test scheduled, workflow_dispatch, repository_dispatch
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' }}
    timeout-minutes: 40
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v7

      - name: Get PR Labels
        if: ${{ github.event_name == 'pull_request' }}
        id: get-labels
        uses: actions/github-script@v6
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(label => label.name);
            core.setOutput("labels", labels.join(","));
      - name: Set image label as environment variable
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          export LABELS=${{ steps.get-labels.outputs.labels }}
          echo "LABELS=${LABELS}" >> $GITHUB_ENV
        shell: bash

      # ensure this in https://github.com/apache/infrastructure-actions/blob/main/actions.yml
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: |
          pnpm exec playwright install --with-deps

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: api/go.sum

      - name: Build Go backend
        run: |
          go build -C api -o ../bin/api ./cmd

      - name: Run e2e server
        working-directory: ./e2e/server
        run: |
          docker compose up -d

      - name: Waiting dashboard service to be healthy
        working-directory: ./e2e/server
        run: |
          TIMEOUT=30
          timeout $TIMEOUT bash -c '
            until curl -f http://127.0.0.1:9180/ui > /dev/null 2>&1; do
              echo "Waiting for APISIX dashboard to be ready..."
              sleep 5
            done
          ' || (echo "APISIX dashboard not ready after $TIMEOUT seconds" && exit 1)

      - name: Start Go backend
        env:
          PORT: "8086"
          ETCD_ENDPOINTS: "http://127.0.0.1:2379"
          ADMIN_PASSWORD: "admin"
        run: |
          JWT_SECRET=$(openssl rand -hex 32)
          export JWT_SECRET
          # Log to a file so the failure step can capture it
          nohup ./bin/api > backend.log 2>&1 &
          echo "Backend PID: $!"

      - name: Wait for Go backend to be healthy
        run: |
          TIMEOUT=30
          timeout $TIMEOUT bash -c '
            until curl -f -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8086/api/v1/login -X POST \
              -H "Content-Type: application/json" -d "{}" | grep -qE "^(400|401)$"; do
              echo "Waiting for Go backend to be ready..."
              sleep 2
            done
          ' || (echo "Go backend not ready after $TIMEOUT seconds"; cat backend.log; exit 1)

      - name: Start vite dev server
        run: |
          nohup pnpm dev > vite.log 2>&1 &
          echo "Vite PID: $!"

      - name: Wait for vite dev server
        run: |
          TIMEOUT=60
          timeout $TIMEOUT bash -c '
            until curl -f -s http://127.0.0.1:5173/ui/ > /dev/null 2>&1; do
              echo "Waiting for vite dev server..."
              sleep 2
            done
          ' || (echo "Vite dev server not ready after $TIMEOUT seconds"; cat vite.log; exit 1)

      - name: Run e2e tests
        env:
          E2E_TARGET_URL: http://127.0.0.1:5173/ui/
        run: |
          pnpm e2e --shard=${{ matrix.shard }}/3

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

      - name: Print Components Logs
        if: failure()
        run: |
          docker ps --format '{{.Names}}' | xargs -I{} bash -c "echo ================= {} ==================== &&  docker logs {} && echo ================= {} ===================="
          if [ -f backend.log ]; then
            echo "================= go-backend ===================="
            cat backend.log
            echo "================= go-backend ===================="
          fi
          if [ -f vite.log ]; then
            echo "================= vite-dev ===================="
            cat vite.log
            echo "================= vite-dev ===================="
          fi
